name: mp_grievance_portal
description: "A lightweight, offline-first Android application built with Flutter for MP Grievance Redressal, designed for older and slower phones in low-bandwidth areas."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  geolocator: ^14.0.3
  image_picker: ^1.2.3
  url_launcher: ^6.3.2
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  speech_to_text: ^7.4.0
  record: ^7.1.1
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
